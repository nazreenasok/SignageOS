services:
  signageos:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: signageos
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${"Database URL"}
      PORT: "8000"
      AUTO_APPROVE_HOUR: "9"
    volumes:
      - signage_uploads:/app/uploads
    restart: unless-stopped
  postgres:
    image: postgres:16
    container_name: signageos-postgres
    environment:
      POSTGRES_DB: ${"DB"}
      POSTGRES_USER: ${"user"}
      POSTGRES_PASSWORD: ${"Password"}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signage -d signageos"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  signage_uploads:
  postgres_data:
